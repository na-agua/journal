<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Journal · na-agua</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@300;400&display=swap');

:root {
  --bg: #e8dcc4;
  --ink: #3a2e22;
  --ink-mid: #6a5a48;
  --ink-dim: #9a8878;
  --ink-soft: #c8b8a8;
  --moss: #4a5e38;
  --moss2: #6a8050;
  --clay: #b07848;
  --clay2: #d09868;
  --border: rgba(58,46,34,0.12);
  --border-h: rgba(58,46,34,0.22);
  --tag-bg: rgba(74,94,56,0.1);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'EB Garamond', Georgia, serif;
  font-weight: 300;
  font-size: 17px;
  line-height: 1.85;
  min-height: 100vh;
}

body::before {
  content:''; position:fixed; inset:0;
  background:
    radial-gradient(ellipse at 15% 15%, rgba(106,128,80,0.1) 0%, transparent 45%),
    radial-gradient(ellipse at 85% 85%, rgba(176,120,72,0.08) 0%, transparent 45%);
  pointer-events:none; z-index:0;
}

.wrap {
  position:relative; z-index:1;
  max-width:640px; margin:0 auto;
  padding:0 24px 100px;
}

/* NAV */
.top-nav {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 0; border-bottom:1px solid var(--border);
}
.top-nav a {
  font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.3em;
  color:var(--ink-dim); text-decoration:none; text-transform:uppercase;
  transition:color 0.2s;
}
.top-nav a:hover { color:var(--moss); }
.top-nav-title {
  font-family:'Cinzel',serif; font-size:9px;
  letter-spacing:0.3em; color:var(--clay);
  text-transform:uppercase; opacity:0.8;
}

/* HEADER */
header { text-align:center; padding:60px 0 48px; }
.header-glyph {
  font-size:28px; display:block; margin-bottom:20px;
  opacity:0.55; animation:breathe 10s ease-in-out infinite;
}
@keyframes breathe { 0%,100%{opacity:0.45;} 50%{opacity:0.75;} }
h1 {
  font-family:'Cinzel',serif; font-size:clamp(22px,5vw,32px);
  font-weight:300; color:var(--ink); letter-spacing:0.18em; margin-bottom:8px;
}
.header-sub { font-style:italic; font-size:15px; color:var(--ink-dim); margin-bottom:32px; }

/* ACTION BUTTONS */
.actions { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
.btn-action {
  font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.25em;
  text-transform:uppercase; padding:10px 20px;
  background:none; border:1px solid var(--border-h);
  color:var(--ink-mid); cursor:pointer; transition:all 0.25s;
  text-decoration:none; display:inline-block;
}
.btn-action:hover { border-color:var(--moss); color:var(--moss); background:rgba(74,94,56,0.06); }
.btn-action.primary { border-color:var(--clay); color:var(--clay); }
.btn-action.primary:hover { background:rgba(176,120,72,0.08); }

/* DIVIDER */
.divider {
  display:flex; align-items:center; gap:16px;
  margin:36px 0 28px; opacity:0.22;
}
.divider::before,.divider::after {
  content:''; flex:1; height:1px;
  background:linear-gradient(to right,transparent,var(--ink),transparent);
}
.divider span {
  font-family:'Cinzel',serif; font-size:9px;
  letter-spacing:0.4em; color:var(--ink); text-transform:uppercase;
}

/* SEARCH */
.search-wrap { position:relative; margin-bottom:16px; }
.search-icon {
  position:absolute; left:14px; top:50%; transform:translateY(-50%);
  color:var(--ink-dim); opacity:0.45; font-size:15px; pointer-events:none;
}
.search-input {
  width:100%; padding:11px 16px 11px 40px;
  background:rgba(255,255,255,0.45); border:1px solid var(--border);
  font-family:'EB Garamond',Georgia,serif; font-size:16px; color:var(--ink);
  outline:none; transition:border-color 0.2s; appearance:none;
}
.search-input:focus { border-color:var(--moss2); background:rgba(255,255,255,0.6); }
.search-input::placeholder { color:var(--ink-soft); font-style:italic; }

/* TAG CLOUD */
.tag-cloud { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:24px; }
.tag-btn {
  font-family:'Cinzel',serif; font-size:8px; letter-spacing:0.2em;
  text-transform:uppercase; padding:5px 11px;
  background:var(--tag-bg); border:1px solid rgba(74,94,56,0.18);
  color:var(--moss); cursor:pointer; transition:all 0.2s;
}
.tag-btn:hover { background:rgba(74,94,56,0.18); }
.tag-btn.active { background:var(--moss); color:var(--bg); border-color:var(--moss); }
.btn-clear {
  font-family:'Cinzel',serif; font-size:8px; letter-spacing:0.2em;
  text-transform:uppercase; padding:5px 11px;
  background:none; border:1px solid var(--border);
  color:var(--ink-dim); cursor:pointer; transition:all 0.2s;
  display:none;
}
.btn-clear.show { display:inline-block; }
.btn-clear:hover { border-color:var(--clay); color:var(--clay); }

/* COUNT */
.note-count {
  font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.3em;
  color:var(--ink-dim); text-transform:uppercase;
  margin-bottom:14px; opacity:0.55;
}

/* NOTES LIST */
.notes-list { display:grid; }

.note-card {
  display:block; text-decoration:none; color:inherit;
  padding:20px 0 18px; border-bottom:1px solid var(--border);
  transition:padding-left 0.25s; position:relative;
}
.note-card:first-child { border-top:1px solid var(--border); }
.note-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0;
  width:0; background:var(--moss); opacity:0.18; transition:width 0.25s;
}
.note-card:hover { padding-left:10px; }
.note-card:hover::before { width:3px; }
.note-card.hidden { display:none !important; }

.note-meta {
  display:flex; align-items:center; gap:8px;
  margin-bottom:5px; flex-wrap:wrap;
}
.note-date {
  font-family:'Cinzel',serif; font-size:8.5px; letter-spacing:0.2em;
  color:var(--ink-dim); text-transform:uppercase; opacity:0.6;
}
.note-status {
  font-family:'Cinzel',serif; font-size:7.5px; letter-spacing:0.15em;
  text-transform:uppercase; padding:2px 7px; border:1px solid;
}
.note-status.seedling  { color:var(--moss);  border-color:rgba(74,94,56,0.3);  }
.note-status.budding   { color:var(--clay);  border-color:rgba(176,120,72,0.3); }
.note-status.evergreen { color:var(--moss2); border-color:rgba(106,128,80,0.4); }

.note-title {
  font-style:italic; font-size:clamp(16px,3vw,20px);
  color:var(--ink); display:block; margin-bottom:5px;
  font-weight:300; line-height:1.4; transition:color 0.2s;
}
.note-card:hover .note-title { color:var(--moss); }

.note-desc {
  font-size:14px; color:var(--ink-dim); line-height:1.6; margin-bottom:9px;
}

.note-tags { display:flex; flex-wrap:wrap; gap:5px; }
.note-tag {
  font-family:'Cinzel',serif; font-size:7.5px; letter-spacing:0.15em;
  text-transform:uppercase; padding:3px 8px;
  background:var(--tag-bg); color:var(--moss); cursor:pointer;
  transition:background 0.2s; border:none;
}
.note-tag:hover { background:rgba(74,94,56,0.22); }

/* EMPTY */
.empty-state {
  text-align:center; padding:56px 0;
  color:var(--ink-dim); font-style:italic; display:none;
}
.empty-state.show { display:block; }

/* FOOTER */
footer {
  text-align:center; padding:48px 0 0;
  border-top:1px solid var(--border); margin-top:48px;
}
footer p { font-size:12px; color:var(--ink-dim); font-style:italic; }
footer a { color:var(--moss); text-decoration:none; }
footer a:hover { color:var(--clay); }

@media(max-width:480px) {
  .wrap { padding:0 16px 80px; }
  header { padding:44px 0 36px; }
  .actions { flex-direction:column; align-items:center; }
}
</style>
</head>
<body>
<div class="wrap">

  <nav class="top-nav">
    <a href="https://na-agua.github.io">← na-agua</a>
    <span class="top-nav-title">Journal</span>
  </nav>

  <header>
    <span class="header-glyph">🌿</span>
    <h1>Journal</h1>
    <div class="header-sub">notes from the edge of the world</div>
    <div class="actions">
      <a class="btn-action primary" href="start-here.html">Start Here</a>
      <button class="btn-action" id="randomBtn">Random Note</button>
    </div>
  </header>

  <div class="divider"><span>all notes</span></div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input class="search-input" id="searchInput" type="text" placeholder="Search titles, tags, descriptions...">
  </div>

  <!-- TAGS -->
  <div class="tag-cloud" id="tagCloud"></div>

  <!-- COUNT -->
  <div class="note-count" id="noteCount"></div>

  <!-- LIST -->
  <div class="notes-list" id="notesList"></div>
  <div class="empty-state" id="emptyState">Nothing found. Try a different search.</div>

  <footer>
    <p>written freely · <a href="https://na-agua.github.io">na-agua</a></p>
  </footer>

</div>

<script>
// ─────────────────────────────────────────────────────────
// ADD YOUR NOTES HERE
// Each note needs: title, url, date, description, tags, status
// ─────────────────────────────────────────────────────────
const NOTES = [

  // ── TEMPLATE — copy this block for each new note ──────
  // {
  //   title: "Your note title here",
  //   url: "your-note-filename.md",
  //   date: "2026-04-06",
  //   description: "One sentence about what this note says.",
  //   tags: ["health", "body"],
  //   status: "seedling"
  // },

  // ── YOUR NOTES ────────────────────────────────────────
  {
    title: "Physical health as the vessel for everything else",
    url: "2026-04-06-physical-health.md",
    date: "2026-04-06",
    description: "The body is not separate from the spiritual path. It is the path.",
    tags: ["health", "body", "practice"],
    status: "seedling"
  },

];
// ─────────────────────────────────────────────────────────


// ── STATE ─────────────────────────────────────────────────
let activeTag = null;
let query = '';

// ── FORMAT DATE ───────────────────────────────────────────
function fmtDate(d) {
  if (!d) return '';
  return new Date(d + 'T12:00:00').toLocaleDateString('en-GB', {
    day:'numeric', month:'long', year:'numeric'
  });
}

// ── BUILD TAGS ────────────────────────────────────────────
function buildTags() {
  const map = {};
  NOTES.forEach(n => (n.tags||[]).forEach(t => map[t] = (map[t]||0)+1));
  const sorted = Object.entries(map).sort((a,b)=>b[1]-a[1]);
  const cloud = document.getElementById('tagCloud');
  cloud.innerHTML = '';
  sorted.forEach(([tag]) => {
    const b = document.createElement('button');
    b.className = 'tag-btn';
    b.textContent = tag;
    b.dataset.tag = tag;
    b.onclick = () => toggleTag(tag);
    cloud.appendChild(b);
  });
  const clr = document.createElement('button');
  clr.className = 'btn-clear';
  clr.id = 'btnClear';
  clr.textContent = '× clear';
  clr.onclick = clearAll;
  cloud.appendChild(clr);
}

// ── RENDER ────────────────────────────────────────────────
function render() {
  const q = query.toLowerCase().trim();
  const list = document.getElementById('notesList');
  const empty = document.getElementById('emptyState');
  list.innerHTML = '';

  const filtered = NOTES.filter(n => {
    const tagOk = !activeTag || (n.tags||[]).includes(activeTag);
    const qOk = !q ||
      n.title.toLowerCase().includes(q) ||
      (n.description||'').toLowerCase().includes(q) ||
      (n.tags||[]).some(t => t.toLowerCase().includes(q));
    return tagOk && qOk;
  });

  document.getElementById('noteCount').textContent =
    filtered.length + ' note' + (filtered.length !== 1 ? 's' : '');

  if (!filtered.length) { empty.classList.add('show'); return; }
  empty.classList.remove('show');

  filtered.forEach(n => {
    const card = document.createElement('a');
    card.className = 'note-card';
    card.href = n.url;
    card.innerHTML = `
      <div class="note-meta">
        <span class="note-date">${fmtDate(n.date)}</span>
        ${n.status ? `<span class="note-status ${n.status}">${n.status}</span>` : ''}
      </div>
      <span class="note-title">${n.title}</span>
      ${n.description ? `<div class="note-desc">${n.description}</div>` : ''}
      <div class="note-tags">${(n.tags||[]).map(t=>
        `<button class="note-tag" data-tag="${t}">${t}</button>`
      ).join('')}</div>
    `;
    card.querySelectorAll('.note-tag').forEach(b => {
      b.onclick = e => { e.preventDefault(); toggleTag(b.dataset.tag); };
    });
    list.appendChild(card);
  });
}

// ── TAG TOGGLE ────────────────────────────────────────────
function toggleTag(tag) {
  activeTag = activeTag === tag ? null : tag;
  document.querySelectorAll('.tag-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tag === activeTag)
  );
  const clr = document.getElementById('btnClear');
  if (clr) clr.classList.toggle('show', !!activeTag || !!query);
  render();
}

function clearAll() {
  activeTag = null; query = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  const clr = document.getElementById('btnClear');
  if (clr) clr.classList.remove('show');
  render();
}

// ── SEARCH ────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', function() {
  query = this.value;
  const clr = document.getElementById('btnClear');
  if (clr) clr.classList.toggle('show', !!activeTag || !!query);
  render();
});

// ── RANDOM ────────────────────────────────────────────────
document.getElementById('randomBtn').addEventListener('click', () => {
  if (!NOTES.length) return;
  const n = NOTES[Math.floor(Math.random() * NOTES.length)];
  window.location.href = n.url;
});

// ── INIT ──────────────────────────────────────────────────
buildTags();
render();
</script>
</body>
</html>
